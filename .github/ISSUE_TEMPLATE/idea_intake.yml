name: Idea Intake
description: Submit a new business idea for BIVA analysis.
title: "IDEA: "
labels: ["idea"]
body:
  - type: textarea
    id: raw_idea
    attributes:
      label: Raw Idea
      description: Describe the idea in plain language.
    validations:
      required: true
  - type: input
    id: target_customer
    attributes:
      label: Target Customer
      description: Who has the problem?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What painful, frequent, or expensive problem exists?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Existing Evidence
      description: Include interviews, paid signals, waitlists, research, or customer quotes.
    validations:
      required: false
  - type: textarea
    id: assumptions
    attributes:
      label: Key Assumptions
      description: List the assumptions BIVA should test.
    validations:
      required: false
